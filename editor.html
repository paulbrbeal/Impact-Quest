<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impact Quest Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f0e8; overflow: hidden; }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect } = React;

/* ─── DEFAULT DATA (simplified starter) ─── */
const DEFAULT_DATA = {
  start: {
    title: "The Impact Quest",
    narrative: "You're Dr. Alex Chen, a researcher at a UK university. Your team has just published a groundbreaking study on how community-led urban green spaces reduce anxiety and improve social cohesion in deprived neighbourhoods.\n\nThe clock is ticking toward REF 2029. What you do next will determine whether this research changes lives — or gathers dust.",
    choices: [
      { text: "Meet with the Impact Officer to develop a strategy", next: "meet_officer" },
      { text: "Go straight to Twitter/X and start promoting the paper", next: "social_media_first" },
      { text: "Contact the local council directly", next: "cold_call_council" }
    ]
  },
  meet_officer: {
    title: "Strategic Thinking",
    narrative: "Smart move. The Impact Officer, Sam, helps you map out a Theory of Change.\n\nSam asks: \"Which pathway do you want to prioritise first?\"",
    choices: [
      { text: "Policy influence — let's aim high", next: "policy_route" },
      { text: "Practitioner change — work with community orgs", next: "practitioner_route" }
    ],
    scoreEffect: { strategy: 10, evidence: 5 }
  },
  social_media_first: {
    title: "Going Viral (Sort Of)",
    narrative: "You write a Twitter thread. It gets 200 likes. A regional paper writes: \"University boffins discover parks are good for you.\"",
    choices: [{ text: "Time to get strategic", next: "meet_officer" }],
    scoreEffect: { reach: 10, significance: -5 }
  },
  cold_call_council: {
    title: "The Cold Shoulder",
    narrative: "You email the council. Three weeks later: \"Thanks, we'll keep it on file.\"",
    choices: [
      { text: "Attend policy engagement training", next: "meet_officer" },
      { text: "Focus on community organisations", next: "practitioner_route" }
    ],
    scoreEffect: { strategy: -5, stakeholders: -5 }
  },
  policy_route: {
    title: "The Policy Pathway",
    narrative: "You craft a policy brief. The council is refreshing its Health & Wellbeing Strategy.\n\nCongratulations! You've built a strong policy-focused impact case study.",
    choices: [],
    scoreEffect: { strategy: 10, stakeholders: 5 },
    isEnding: true,
    endingType: "policy"
  },
  practitioner_route: {
    title: "Working With Communities",
    narrative: "You connect with community organisations. One deep partnership beats three shallow ones.\n\nCongratulations! You've built a practice-based impact case study.",
    choices: [],
    scoreEffect: { stakeholders: 10, strategy: 5 },
    isEnding: true,
    endingType: "practitioner"
  }
};

const SCORE_KEYS = ["strategy", "stakeholders", "significance", "reach", "evidence"];
const SCORE_COLORS = { strategy: "#E8A838", stakeholders: "#4ECDC4", significance: "#FF6B6B", reach: "#45B7D1", evidence: "#96CEB4" };
const ENDING_TYPES = ["none", "policy", "practitioner", "cycle"];
const uid = () => "node_" + Math.random().toString(36).slice(2, 8);

function Editor() {
  const [nodes, setNodes] = useState(DEFAULT_DATA);
  const [order, setOrder] = useState(() => Object.keys(DEFAULT_DATA));
  const [selected, setSelected] = useState("start");
  const [search, setSearch] = useState("");
  const [toast, setToast] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [importText, setImportText] = useState("");
  const [showExport, setShowExport] = useState(null);
  const [exportText, setExportText] = useState("");
  const [tab, setTab] = useState("content");
  const [loaded, setLoaded] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [ghToken, setGhToken] = useState(() => localStorage.getItem("iq_gh_token") || "");
  const [ghRepo, setGhRepo] = useState(() => localStorage.getItem("iq_gh_repo") || "paulbrbeal/Impact-Quest");
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef(null);
  const imgRef = useRef(null);

  // Save GitHub settings to session (cleared when browser tab closes)
  const saveGhSettings = (token, repo) => {
    setGhToken(token);
    setGhRepo(repo);
    if (token) localStorage.setItem("iq_gh_token", token);
    else localStorage.removeItem("iq_gh_token");
    if (repo) localStorage.setItem("iq_gh_repo", repo);
    else localStorage.removeItem("iq_gh_repo");
  };

  // Upload image to GitHub repo
  const uploadImage = useCallback((file) => {
    var cleanToken = ghToken.replace(/[^\x20-\x7E]/g, "").trim();
    if (!cleanToken) { flash("Set up GitHub token in Settings first"); setShowSettings(true); return; }
    if (!file) return;
    const maxSize = 5 * 1024 * 1024;
    if (file.size > maxSize) { flash("Image too large (max 5MB)"); return; }

    setUploading(true);
    const reader = new FileReader();
    reader.onload = function(ev) {
      const base64 = ev.target.result.split(",")[1];
      const safeName = file.name.toLowerCase().replace(/[^a-z0-9.\-_]/g, "-");
      const path = "images/" + safeName;
      const url = "https://api.github.com/repos/" + ghRepo + "/contents/" + path;

      // Check if file already exists (need its sha to overwrite)
      fetch(url, { headers: { "Authorization": "Bearer " + cleanToken } })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(existing) {
          var body = { message: "Upload image: " + safeName, content: base64 };
          if (existing && existing.sha) body.sha = existing.sha;
          return fetch(url, {
            method: "PUT",
            headers: { "Authorization": "Bearer " + cleanToken, "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
        })
        .then(function(r) {
          if (!r.ok) throw new Error("GitHub API returned " + r.status);
          return r.json();
        })
        .then(function(data) {
          // Build the GitHub Pages URL
          var parts = ghRepo.split("/");
          var pagesUrl = "https://" + parts[0] + ".github.io/" + parts[1] + "/" + path;
          update(selected, { image: pagesUrl });
          setUploading(false);
          flash("Image uploaded!");
        })
        .catch(function(err) {
          setUploading(false);
          flash("Upload failed: " + err.message);
        });
    };
    reader.readAsDataURL(file);
  }, [ghToken, ghRepo, selected, flash, update]);

  // Auto-load game-data.json from same folder on startup (cache-bust)
  React.useEffect(() => {
    fetch("game-data.json?t=" + Date.now())
      .then(r => r.json())
      .then(data => {
        if (data && typeof data === "object" && Object.keys(data).length > 0) {
          setNodes(data);
          setOrder(Object.keys(data));
          setSelected(Object.keys(data)[0] || "start");
          setLoaded(true);
        }
      })
      .catch(() => { /* no game-data.json found, use defaults */ });
  }, []);

  const node = selected ? nodes[selected] : null;
  const nodeList = order.filter(id => nodes[id]).map(id => [id, nodes[id]]);
  const filtered = search
    ? nodeList.filter(([id, n]) => n.title.toLowerCase().includes(search.toLowerCase()) || id.includes(search.toLowerCase()))
    : nodeList;

  const flash = useCallback((msg) => { setToast(msg); setTimeout(() => setToast(null), 2200); }, []);

  // ── Node operations ──
  const update = useCallback((id, changes) => {
    setNodes(prev => ({ ...prev, [id]: { ...prev[id], ...changes } }));
  }, []);

  const addNode = useCallback(() => {
    const id = uid();
    setNodes(prev => ({ ...prev, [id]: { title: "New Scene", narrative: "", choices: [], scoreEffect: {} } }));
    setOrder(prev => [...prev, id]);
    setSelected(id);
    setSearch("");
    flash("Scene added");
  }, [flash]);

  const deleteNode = useCallback((id) => {
    if (id === "start") { flash("Can't delete the start node"); return; }
    setNodes(prev => {
      const next = { ...prev };
      delete next[id];
      Object.values(next).forEach(n => {
        if (n.choices) n.choices = n.choices.map(c => c.next === id ? { ...c, next: "" } : c);
      });
      return next;
    });
    setOrder(prev => prev.filter(x => x !== id));
    setSelected("start");
    flash("Scene deleted");
  }, [flash]);

  const dupNode = useCallback((id) => {
    const src = nodes[id];
    const nid = uid();
    setNodes(prev => ({ ...prev, [nid]: { ...src, title: src.title + " (copy)", choices: (src.choices || []).map(c => ({ ...c })), scoreEffect: { ...(src.scoreEffect || {}) } } }));
    setOrder(prev => { const i = prev.indexOf(id); const next = [...prev]; next.splice(i + 1, 0, nid); return next; });
    setSelected(nid);
    flash("Duplicated");
  }, [nodes, flash]);

  // ── Choice operations ──
  const addChoice = () => update(selected, { choices: [...(node.choices || []), { text: "New choice", next: "" }] });
  const updateChoice = (i, changes) => {
    const choices = [...node.choices];
    choices[i] = { ...choices[i], ...changes };
    update(selected, { choices });
  };
  const removeChoice = (i) => update(selected, { choices: node.choices.filter((_, idx) => idx !== i) });
  const moveChoice = (i, dir) => {
    const choices = [...node.choices];
    const j = i + dir;
    if (j < 0 || j >= choices.length) return;
    [choices[i], choices[j]] = [choices[j], choices[i]];
    update(selected, { choices });
  };

  // ── Rename node ID ──
  const renameNode = useCallback((oldId, newId) => {
    newId = newId.trim().toLowerCase().replace(/[^a-z0-9_]/g, "_");
    if (!newId || newId === oldId) return;
    if (nodes[newId]) { flash("ID '" + newId + "' already exists"); return; }
    setNodes(prev => {
      const next = {};
      Object.entries(prev).forEach(([id, n]) => {
        const key = id === oldId ? newId : id;
        const updated = { ...n, choices: (n.choices || []).map(c => c.next === oldId ? { ...c, next: newId } : { ...c }) };
        next[key] = updated;
      });
      return next;
    });
    setOrder(prev => prev.map(id => id === oldId ? newId : id));
    setSelected(newId);
    flash("Renamed to " + newId);
  }, [nodes, flash]);

  // ── Reorder scenes ──
  const moveScene = useCallback((id, dir) => {
    setOrder(prev => {
      const i = prev.indexOf(id);
      const j = i + dir;
      if (j < 0 || j >= prev.length) return prev;
      const next = [...prev];
      [next[i], next[j]] = [next[j], next[i]];
      return next;
    });
  }, []);

  // ── Sort by flow (BFS from start) ──
  const sortByFlow = useCallback(() => {
    const visited = new Set();
    const sorted = [];
    const queue = ["start"];
    while (queue.length > 0) {
      const id = queue.shift();
      if (visited.has(id) || !nodes[id]) continue;
      visited.add(id);
      sorted.push(id);
      (nodes[id].choices || []).forEach(c => {
        if (c.next && !visited.has(c.next)) queue.push(c.next);
      });
    }
    // Add any orphaned nodes at the end
    Object.keys(nodes).forEach(id => {
      if (!visited.has(id)) sorted.push(id);
    });
    setOrder(sorted);
    flash("Sorted by flow");
  }, [nodes, flash]);

  // ── Import / Export ──
  const buildClean = () => {
    const clean = {};
    order.filter(id => nodes[id]).forEach(id => {
      const n = nodes[id];
      clean[id] = { title: n.title, narrative: n.narrative, choices: (n.choices || []).filter(c => c.text) };
      if (n.image) { clean[id].image = n.image; clean[id].imageSize = n.imageSize || "large"; }
      if (n.scoreEffect && Object.keys(n.scoreEffect).length) clean[id].scoreEffect = n.scoreEffect;
      if (n.isEnding) { clean[id].isEnding = true; clean[id].endingType = n.endingType || "policy"; }
    });
    return clean;
  };

  const buildFullHTML = (gameDataStr) => {
    // Fetch the game template from same server and inject data
    return fetch("index.html")
      .then(r => r.text())
      .then(html => {
        // Replace the fetch-based loader with inline data
        var marker = '// Load game data from external JSON file and boot the app';
        var markerIdx = html.indexOf(marker);
        if (markerIdx === -1) {
          // Fallback: just return JSON to paste manually
          return "const GAME_DATA = " + gameDataStr + ";";
        }
        // Find the start of the fetch block and the end of the script
        var fetchStart = html.lastIndexOf('\n', markerIdx);
        var scriptEnd = html.indexOf('\n<' + '/script>', markerIdx);
        var before = html.substring(0, fetchStart);
        var after = html.substring(scriptEnd);
        // Build inline loader
        var inlineLoader = '\nvar GAME_DATA = ' + gameDataStr + ';\n';
        inlineLoader += 'ReactDOM.render(e(App,{data:GAME_DATA}),document.getElementById("app"));\n';
        return before + inlineLoader + after;
      });
  };

  const exportJSON = () => {
    const clean = buildClean();
    var blob = new Blob([JSON.stringify(clean, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "game-data.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    flash("JSON downloaded!");
  };

  const [saving, setSaving] = useState(false);

  const saveToGitHub = () => {
    var cleanToken = (ghToken || "").replace(/[^\x20-\x7E]/g, "").trim();
    if (!cleanToken) { flash("Set up GitHub token in Settings first"); setShowSettings(true); return; }

    setSaving(true);
    flash("Saving to GitHub...");

    // Build clean data inline (not via buildClean) to ensure we read current state
    var clean = {};
    order.filter(function(id) { return nodes[id]; }).forEach(function(id) {
      var n = nodes[id];
      clean[id] = { title: n.title, narrative: n.narrative, choices: (n.choices || []).filter(function(c) { return c.text; }) };
      if (n.image) { clean[id].image = n.image; clean[id].imageSize = n.imageSize || "large"; }
      if (n.scoreEffect && Object.keys(n.scoreEffect).length) clean[id].scoreEffect = n.scoreEffect;
      if (n.isEnding) { clean[id].isEnding = true; clean[id].endingType = n.endingType || "policy"; }
    });

    var jsonStr = JSON.stringify(clean, null, 2);
    var base64 = btoa(unescape(encodeURIComponent(jsonStr)));
    var apiUrl = "https://api.github.com/repos/" + ghRepo + "/contents/game-data.json";

    fetch(apiUrl, { headers: { "Authorization": "Bearer " + cleanToken } })
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(existing) {
        var body = { message: "Update game data from editor", content: base64 };
        if (existing && existing.sha) body.sha = existing.sha;
        return fetch(apiUrl, {
          method: "PUT",
          headers: { "Authorization": "Bearer " + cleanToken, "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
      })
      .then(function(r) {
        if (!r.ok) throw new Error("GitHub API returned " + r.status);
        return r.json();
      })
      .then(function() {
        setSaving(false);
        flash("Saved to GitHub!");
      })
      .catch(function(err) {
        setSaving(false);
        flash("Save failed: " + err.message);
      });
  };

  const copyForHTML = () => {
    const clean = buildClean();
    const gameDataStr = JSON.stringify(clean, null, 2);
    flash("Generating HTML game...");
    buildFullHTML(gameDataStr).then(fullHTML => {
      var blob = new Blob([fullHTML], { type: "text/html" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "the-impact-quest.html";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      flash("Game downloaded!");
    }).catch(function(e) {
      flash("Could not generate HTML — try Export JSON instead");
    });
  };

  const importJSON = () => {
    try {
      const data = JSON.parse(importText);
      setNodes(data);
      setOrder(Object.keys(data));
      setSelected(Object.keys(data)[0] || "start");
      setShowImport(false);
      setImportText("");
      flash(Object.keys(data).length + " scenes imported");
    } catch(e) { flash("Invalid JSON"); }
  };

  const importFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        setNodes(data);
        setOrder(Object.keys(data));
        setSelected(Object.keys(data)[0] || "start");
        flash(Object.keys(data).length + " scenes imported from file");
      } catch(e) { flash("Invalid JSON file"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };



  // ── Inbound links (what leads here) ──
  const inbound = selected ? nodeList.filter(([id, n]) => (n.choices || []).some(c => c.next === selected)).map(([id]) => id) : [];

  // ── Preview trace ──
  const getTrace = (startId, maxDepth = 8) => {
    const trace = [];
    let current = startId;
    const visited = new Set();
    while (current && nodes[current] && !visited.has(current) && trace.length < maxDepth) {
      visited.add(current);
      const n = nodes[current];
      trace.push({ id: current, title: n.title, isEnding: n.isEnding });
      const firstChoice = (n.choices || [])[0];
      current = firstChoice ? firstChoice.next : null;
    }
    return trace;
  };

  // ── Styles ──
  const s = {
    inp: { width: "100%", background: "#ffffff", border: "1px solid #d8d2c4", color: "#0f0e0d", padding: "8px 10px", borderRadius: 3, fontSize: 13, fontFamily: "'DM Sans', sans-serif", marginBottom: 12, outline: "none", boxSizing: "border-box" },
    sel: { width: "100%", background: "#ffffff", border: "1px solid #d8d2c4", color: "#0f0e0d", padding: "7px 8px", borderRadius: 3, fontSize: 12, fontFamily: "'DM Sans', sans-serif", outline: "none", boxSizing: "border-box" },
    label: { display: "block", fontSize: 10, fontWeight: 700, color: "#8c8272", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 5, fontFamily: "'DM Sans', sans-serif" },
    btn: { background: "#0f0e0d", border: "1px solid #0f0e0d", color: "#f5f0e8", padding: "5px 12px", borderRadius: 3, fontSize: 11, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontWeight: 600, letterSpacing: "0.03em" },
    accent: { background: "#e8963a", border: "1px solid #c4782a", color: "#0f0e0d", padding: "5px 12px", borderRadius: 3, fontSize: 11, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontWeight: 700, letterSpacing: "0.03em" },
  };

  return (
    <div style={{ display: "flex", height: "100vh", fontFamily: "'DM Sans', sans-serif", background: "#f5f0e8", color: "#0f0e0d", overflow: "hidden" }}>

      {/* ── LEFT: Scene List ── */}
      <div style={{ width: 280, borderRight: "2px solid #0f0e0d", display: "flex", flexDirection: "column", flexShrink: 0, background: "#0f0e0d" }}>

        {/* Toolbar */}
        <div style={{ padding: "12px 12px 8px", borderBottom: "1px solid #2a2826" }}>
          <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 10, color: "#f5f0e8", display: "flex", alignItems: "center", gap: 8, fontFamily: "'Bebas Neue', sans-serif", letterSpacing: 2 }}>
            <span style={{ color: "#e8963a" }}>IMPACT</span> QUEST EDITOR
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
            <button onClick={saveToGitHub} disabled={saving} style={{ ...s.accent, opacity: saving ? 0.6 : 1 }}>{saving ? "Saving..." : "Save"}</button>
            <button onClick={addNode} style={s.btn}>+ Scene</button>
            <button onClick={sortByFlow} style={s.btn}>Sort by Flow</button>
            <button onClick={exportJSON} style={s.btn}>Export</button>
            <button onClick={() => fileRef.current.click()} style={s.btn}>Import</button>
            <button onClick={copyForHTML} style={s.accent}>Generate HTML</button>
            <button onClick={() => setShowSettings(true)} style={{ ...s.btn, fontSize: 11 }}>Settings</button>
            <input ref={fileRef} type="file" accept=".json" onChange={importFile} style={{ display: "none" }} />
          </div>
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Search scenes..."
            style={{ ...s.inp, marginBottom: 0, fontSize: 12, padding: "6px 10px", background: "#1a1917", border: "1px solid #2a2826", color: "#c8bfaa" }}
          />
        </div>

        {/* Scene list */}
        <div style={{ flex: 1, overflowY: "auto", padding: "4px 0" }}>
          {filtered.map(([id, n], idx) => {
            const isSel = id === selected;
            const isEnd = n.isEnding;
            const choiceCount = (n.choices || []).length;
            const hasOrphan = (n.choices || []).some(c => c.next && !nodes[c.next]);
            const orderIdx = order.indexOf(id);
            return (
              <div
                key={id}
                onClick={() => { setSelected(id); setTab("content"); }}
                style={{
                  padding: "8px 14px",
                  cursor: "pointer",
                  background: isSel ? "#1a1917" : "transparent",
                  borderLeft: isSel ? "3px solid #e8963a" : "3px solid transparent",
                  transition: "all 0.1s",
                }}
              >
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  {id === "start" && <span style={{ fontSize: 8, background: "#e8963a", color: "#0f0e0d", padding: "1px 5px", borderRadius: 2, fontWeight: 800, letterSpacing: 0.5 }}>START</span>}
                  {isEnd && <span style={{ fontSize: 8, background: "#4a6741", color: "#fff", padding: "1px 5px", borderRadius: 2, fontWeight: 800, letterSpacing: 0.5 }}>END</span>}
                  {hasOrphan && <span style={{ fontSize: 8, background: "#c0392b", color: "#fff", padding: "1px 5px", borderRadius: 2, fontWeight: 800, letterSpacing: 0.5 }}>FIX</span>}
                  {n.image && <span style={{ fontSize: 8, background: "#5b7fb5", color: "#fff", padding: "1px 5px", borderRadius: 2, fontWeight: 800, letterSpacing: 0.5 }}>IMG</span>}
                  <span style={{ fontSize: 13, fontWeight: 500, color: isSel ? "#f5f0e8" : "#c8bfaa", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>{n.title}</span>
                  {isSel && !search && (
                    <span style={{ display: "flex", gap: 2 }} onClick={e => e.stopPropagation()}>
                      <button onClick={() => moveScene(id, -1)} disabled={orderIdx === 0} style={{ background: "none", border: "none", color: orderIdx === 0 ? "#3a3530" : "#c8bfaa", cursor: "pointer", fontSize: 11, padding: "0 3px", fontFamily: "inherit" }}>▲</button>
                      <button onClick={() => moveScene(id, 1)} disabled={orderIdx === order.length - 1} style={{ background: "none", border: "none", color: orderIdx === order.length - 1 ? "#3a3530" : "#c8bfaa", cursor: "pointer", fontSize: 11, padding: "0 3px", fontFamily: "inherit" }}>▼</button>
                    </span>
                  )}
                </div>
                <div style={{ fontSize: 10, color: "#6b6459", marginTop: 2, display: "flex", gap: 8 }}>
                  <span style={{ fontFamily: "monospace" }}>{id}</span>
                  {choiceCount > 0 && <span>{choiceCount} choice{choiceCount > 1 ? "s" : ""}</span>}
                </div>
              </div>
            );
          })}
        </div>

        <div style={{ padding: "8px 14px", borderTop: "1px solid #2a2826", fontSize: 11, color: "#6b6459" }}>
          {nodeList.length} scenes · {nodeList.filter(([_, n]) => n.isEnding).length} endings
        </div>
      </div>

      {/* ── RIGHT: Editor ── */}
      <div style={{ flex: 1, overflowY: "auto", background: "#f5f0e8" }}>
        {node ? (
          <div style={{ maxWidth: 680, margin: "0 auto", padding: "24px 28px" }}>

            {/* Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16, paddingBottom: 12, borderBottom: "2px solid #0f0e0d" }}>
              <h2 style={{ fontSize: 28, fontWeight: 700, color: "#0f0e0d", margin: 0, fontFamily: "'Bebas Neue', sans-serif", letterSpacing: 2 }}>{node.title}</h2>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => dupNode(selected)} style={s.btn} title="Duplicate">Duplicate</button>
                {selected !== "start" && <button onClick={() => deleteNode(selected)} style={{ ...s.btn, background: "#c0392b", color: "#fff", borderColor: "#c0392b" }}>Delete</button>}
              </div>
            </div>

            {/* Tabs */}
            <div style={{ display: "flex", gap: 0, marginBottom: 20, borderBottom: "1px solid #d8d2c4" }}>
              {[["content", "Content"], ["scores", "Scores & Settings"], ["preview", "Flow Preview"]].map(([key, label]) => (
                <button
                  key={key}
                  onClick={() => setTab(key)}
                  style={{
                    background: "none", border: "none", borderBottom: tab === key ? "3px solid #e8963a" : "3px solid transparent",
                    color: tab === key ? "#0f0e0d" : "#8c8272", padding: "8px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                    transition: "all 0.15s", letterSpacing: "0.05em", textTransform: "uppercase",
                  }}
                >{label}</button>
              ))}
            </div>

            {/* ── Content Tab ── */}
            {tab === "content" && (
              <>
                <label style={s.label}>Scene Title</label>
                <input value={node.title} onChange={e => update(selected, { title: e.target.value })} style={s.inp} />

                {/* Scene Image */}
                <label style={s.label}>Scene Image (optional)</label>
                <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
                  <input
                    value={node.image || ""}
                    onChange={e => update(selected, { image: e.target.value })}
                    placeholder="Paste a URL or upload an image"
                    style={{ ...s.inp, marginBottom: 0, flex: 1 }}
                  />
                  {node.image && (
                    <button
                      onClick={e => { e.stopPropagation(); update(selected, { image: "", imageSize: undefined }); }}
                      style={{ background: "#fdeeed", border: "1px solid #e8c4c0", color: "#c0392b", padding: "5px 10px", borderRadius: 3, fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, whiteSpace: "nowrap" }}
                    >Remove</button>
                  )}
                  <button
                    onClick={() => imgRef.current.click()}
                    disabled={uploading}
                    style={{ ...s.accent, opacity: uploading ? 0.6 : 1, whiteSpace: "nowrap" }}
                  >{uploading ? "Uploading..." : "Upload"}</button>
                  <input ref={imgRef} type="file" accept="image/*" onChange={e => { if (e.target.files[0]) uploadImage(e.target.files[0]); e.target.value = ""; }} style={{ display: "none" }} />
                </div>
                {node.image && (
                  <div style={{ marginBottom: 14 }}>
                    {/* Size selector */}
                    <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                      {[
                        { key: "small", label: "Small", w: "40%" },
                        { key: "medium", label: "Medium", w: "65%" },
                        { key: "large", label: "Large", w: "100%" },
                        { key: "banner", label: "Banner", w: "100%" },
                      ].map(opt => {
                        const current = node.imageSize || "large";
                        const active = current === opt.key;
                        return (
                          <button
                            key={opt.key}
                            onClick={() => update(selected, { imageSize: opt.key })}
                            style={{
                              ...s.btn,
                              padding: "4px 10px",
                              fontSize: 11,
                              background: active ? "#e8963a" : "#0f0e0d",
                              color: active ? "#0f0e0d" : "#f5f0e8",
                              borderColor: active ? "#4ECDC4" : "#d8d2c4",
                            }}
                          >{opt.label}</button>
                        );
                      })}
                    </div>
                    {/* Preview */}
                    <div style={{ borderRadius: 8, overflow: "hidden", border: "1px solid #d8d2c4" }}>
                      <div style={{ display: "flex", justifyContent: node.imageSize === "small" || node.imageSize === "medium" ? "center" : "stretch", background: "#ede8da", padding: (node.imageSize === "small" || node.imageSize === "medium") ? 12 : 0 }}>
                        <img
                          src={node.image}
                          alt="Scene image"
                          style={{
                            width: node.imageSize === "small" ? "40%" : node.imageSize === "medium" ? "65%" : "100%",
                            maxHeight: node.imageSize === "banner" ? 120 : 200,
                            objectFit: "cover",
                            display: "block",
                            borderRadius: (node.imageSize === "small" || node.imageSize === "medium") ? 6 : 0,
                          }}
                          onError={e => { e.target.style.display = "none"; }}
                        />
                      </div>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 10px", background: "#ffffff" }}>
                        <span style={{ fontSize: 10, color: "#8c8272", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 }}>
                          {(node.imageSize || "large").charAt(0).toUpperCase() + (node.imageSize || "large").slice(1)} · {node.image.length > 40 ? node.image.slice(0, 40) + "…" : node.image}
                        </span>
                        <button onClick={e => { e.stopPropagation(); update(selected, { image: "", imageSize: undefined }); }} style={{ background: "#fdeeed", border: "1px solid #e8c4c0", color: "#c0392b", cursor: "pointer", fontSize: 11, padding: "2px 8px", borderRadius: 3, fontFamily: "inherit", fontWeight: 600 }}>Remove</button>
                      </div>
                    </div>
                  </div>
                )}

                <label style={s.label}>Narrative</label>
                <textarea
                  value={node.narrative}
                  onChange={e => update(selected, { narrative: e.target.value })}
                  style={{ ...s.inp, minHeight: 200, resize: "vertical", lineHeight: 1.7 }}
                />

                {/* Choices */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, marginTop: 8 }}>
                  <label style={{ ...s.label, marginBottom: 0 }}>Choices ({(node.choices || []).length})</label>
                  <button onClick={addChoice} style={s.btn}>+ Add Choice</button>
                </div>

                {(node.choices || []).map((c, i) => (
                  <div key={i} style={{ background: "#ffffff", borderRadius: 8, padding: 14, marginBottom: 10, border: "1px solid #d8d2c4" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span style={{ fontSize: 12, fontWeight: 700, color: "#c4782a" }}>Choice {String.fromCharCode(65 + i)}</span>
                      <div style={{ display: "flex", gap: 4 }}>
                        <button onClick={() => moveChoice(i, -1)} disabled={i === 0} style={{ background: "#ede8da", border: "1px solid #d8d2c4", color: "#0f0e0d", padding: "2px 8px", borderRadius: 3, fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, opacity: i === 0 ? 0.3 : 1 }}>↑</button>
                        <button onClick={() => moveChoice(i, 1)} disabled={i === node.choices.length - 1} style={{ background: "#ede8da", border: "1px solid #d8d2c4", color: "#0f0e0d", padding: "2px 8px", borderRadius: 3, fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: 600, opacity: i === node.choices.length - 1 ? 0.3 : 1 }}>↓</button>
                        <button onClick={() => removeChoice(i)} style={{ background: "#fdeeed", border: "1px solid #e8c4c0", color: "#c0392b", padding: "2px 8px", borderRadius: 3, fontSize: 11, cursor: "pointer", fontFamily: "inherit", fontWeight: 600 }}>✕</button>
                      </div>
                    </div>
                    <input value={c.text} onChange={e => updateChoice(i, { text: e.target.value })} placeholder="What the player sees..." style={{ ...s.inp, marginBottom: 8 }} />
                    <label style={{ ...s.label, fontSize: 9 }}>Links to</label>
                    <select value={c.next || ""} onChange={e => updateChoice(i, { next: e.target.value })} style={s.sel}>
                      <option value="">— Select target scene —</option>
                      {nodeList.filter(([nid]) => nid !== selected).map(([nid, nn]) => (
                        <option key={nid} value={nid}>{nn.title} ({nid})</option>
                      ))}
                    </select>
                    {c.next && nodes[c.next] && (
                      <button onClick={() => { setSelected(c.next); setTab("content"); }} style={{ marginTop: 6, background: "none", border: "none", color: "#c4782a", fontSize: 11, cursor: "pointer", padding: 0, fontFamily: "inherit" }}>
                        → Go to: {nodes[c.next].title}
                      </button>
                    )}
                  </div>
                ))}

                {/* Inbound links */}
                {inbound.length > 0 && (
                  <div style={{ marginTop: 16, padding: 12, background: "#ffffff", borderRadius: 8, border: "1px solid #d8d2c4" }}>
                    <label style={{ ...s.label, marginBottom: 8 }}>Scenes that link here ({inbound.length})</label>
                    <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                      {inbound.map(id => (
                        <button key={id} onClick={() => { setSelected(id); setTab("content"); }} style={{ background: "#ede8da", border: "1px solid #d8d2c4", color: "#c4782a", padding: "4px 10px", borderRadius: 5, fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>
                          ← {nodes[id] && nodes[id].title}
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}

            {/* ── Scores Tab ── */}
            {tab === "scores" && (
              <>
                <label style={s.label}>Ending Scene?</label>
                <select
                  value={node.isEnding ? (node.endingType || "policy") : "none"}
                  onChange={e => {
                    if (e.target.value === "none") update(selected, { isEnding: false, endingType: undefined });
                    else update(selected, { isEnding: true, endingType: e.target.value });
                  }}
                  style={{ ...s.sel, marginBottom: 16 }}
                >
                  {ENDING_TYPES.map(t => <option key={t} value={t}>{t === "none" ? "Not an ending" : t.charAt(0).toUpperCase() + t.slice(1) + " ending"}</option>)}
                </select>

                <label style={s.label}>Score Effects</label>
                <p style={{ fontSize: 11, color: "#8c8272", marginBottom: 12, marginTop: 0 }}>Points added (or subtracted) when the player reaches this scene.</p>
                <div style={{ background: "#ffffff", borderRadius: 8, padding: 16, border: "1px solid #d8d2c4" }}>
                  {SCORE_KEYS.map(k => (
                    <div key={k} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                      <div style={{ width: 8, height: 8, borderRadius: "50%", background: SCORE_COLORS[k], flexShrink: 0 }} />
                      <span style={{ fontSize: 13, color: SCORE_COLORS[k], width: 110, fontWeight: 600 }}>{k.charAt(0).toUpperCase() + k.slice(1)}</span>
                      <input
                        type="range" min={-30} max={30} step={5}
                        value={(node.scoreEffect && node.scoreEffect[k]) || 0}
                        onChange={e => {
                          const v = parseInt(e.target.value) || 0;
                          const se = { ...(node.scoreEffect || {}) };
                          if (v === 0) delete se[k]; else se[k] = v;
                          update(selected, { scoreEffect: se });
                        }}
                        style={{ flex: 1, accentColor: SCORE_COLORS[k] }}
                      />
                      <span style={{ fontSize: 14, fontWeight: 700, color: SCORE_COLORS[k], width: 36, textAlign: "right", fontFamily: "monospace" }}>
                        {((node.scoreEffect && node.scoreEffect[k]) || 0) > 0 ? "+" : ""}{(node.scoreEffect && node.scoreEffect[k]) || 0}
                      </span>
                    </div>
                  ))}
                </div>

                <div style={{ marginTop: 20 }}>
                  <label style={s.label}>Node ID</label>
                  <div style={{ display: "flex", gap: 6 }}>
                    <input
                      id="renameInput"
                      defaultValue={selected}
                      key={selected}
                      placeholder="scene_id"
                      style={{ ...s.inp, marginBottom: 0, fontFamily: "monospace", fontSize: 12, flex: 1 }}
                      onKeyDown={e => { if (e.key === "Enter") renameNode(selected, e.target.value); }}
                    />
                    <button onClick={() => renameNode(selected, document.getElementById("renameInput").value)} style={s.btn}>Rename</button>
                  </div>
                  <div style={{ fontSize: 10, color: "#8c8272", marginTop: 4 }}>Lowercase letters, numbers and underscores only. Press Enter or click Rename.</div>
                </div>
              </>
            )}

            {/* ── Preview Tab ── */}
            {tab === "preview" && (
              <>
                <p style={{ fontSize: 12, color: "#8c8272", marginBottom: 16, marginTop: 0 }}>Shows the path from this scene following the first choice at each step. Click any scene to jump to it.</p>
                <div style={{ position: "relative", paddingLeft: 20 }}>
                  {/* Vertical line */}
                  <div style={{ position: "absolute", left: 9, top: 12, bottom: 12, width: 2, background: "#d8d2c4" }} />

                  {getTrace(selected, 12).map((t, i) => {
                    const n = nodes[t.id];
                    const choices = n && n.choices || [];
                    return (
                      <div key={t.id + "-" + i} style={{ position: "relative", marginBottom: 4 }}>
                        {/* Dot */}
                        <div style={{
                          position: "absolute", left: -16, top: 12,
                          width: 12, height: 12, borderRadius: "50%",
                          background: i === 0 ? "#e8963a" : t.isEnding ? "#4a6741" : "#d8d2c4",
                          border: "2px solid #f5f0e8",
                        }} />

                        <div
                          onClick={() => { setSelected(t.id); setTab("content"); }}
                          style={{
                            background: t.id === selected ? "#ede8da" : "#ffffff",
                            border: t.id === selected ? "2px solid #e8963a" : "1px solid #d8d2c4",
                            borderRadius: 3, padding: "10px 14px", cursor: "pointer",
                            transition: "border-color 0.15s",
                          }}
                        >
                          <div style={{ fontSize: 14, fontWeight: 700, color: "#0f0e0d", marginBottom: 2, fontFamily: "'Bebas Neue', sans-serif", letterSpacing: 1 }}>
                            {t.isEnding && <span style={{ color: "#4a6741", marginRight: 6 }}>🏁</span>}
                            {t.title}
                          </div>
                          <div style={{ fontSize: 10, color: "#8c8272", fontFamily: "monospace", marginBottom: 4 }}>{t.id}</div>
                          {choices.length > 0 && (
                            <div style={{ marginTop: 4 }}>
                              {choices.map((c, ci) => (
                                <div key={ci} style={{ fontSize: 11, color: ci === 0 ? "#c4782a" : "#8c8272", padding: "1px 0", fontWeight: ci === 0 ? 600 : 400 }}>
                                  {ci === 0 ? "→ " : "  "}{c.text}{ci === 0 && " (followed)"}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </>
            )}

          </div>
        ) : (
          <div style={{ padding: 40, textAlign: "center", color: "#8c8272" }}>Select a scene to edit</div>
        )}
      </div>

      {/* ── Import Modal ── */}
      {showImport && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 500 }} onClick={() => setShowImport(false)}>
          <div style={{ background: "#ffffff", border: "1px solid #d8d2c4", borderRadius: 12, padding: 24, width: 500 }} onClick={e => e.stopPropagation()}>
            <h3 style={{ fontSize: 16, fontWeight: 700, color: "#0f0e0d", marginBottom: 12 }}>Import JSON</h3>
            <textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder="Paste JSON here..." style={{ ...s.inp, minHeight: 200, fontFamily: "monospace", fontSize: 11 }} />
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setShowImport(false)} style={s.btn}>Cancel</button>
              <button onClick={importJSON} style={s.accent}>Import</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Export Modal ── */}
      {showExport && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 500 }} onClick={() => setShowExport(null)}>
          <div style={{ background: "#ffffff", border: "1px solid #d8d2c4", borderRadius: 12, padding: 24, width: 640, maxHeight: "85vh", display: "flex", flexDirection: "column" }} onClick={e => e.stopPropagation()}>
            <h3 style={{ fontSize: 16, fontWeight: 700, color: "#0f0e0d", marginBottom: 4 }}>
              {showExport === "html" ? "Generate Playable HTML" : "Export JSON"}
            </h3>
            <p style={{ fontSize: 12, color: "#8c8272", marginBottom: 12, lineHeight: 1.6 }}>
              {showExport === "html"
                ? "This is a complete, standalone HTML game file. To save it: click inside the box, press Ctrl+A (select all), then Ctrl+C (copy). Open Notepad, paste it in, then File → Save As → change type to \"All Files\" → name it something.html → Save. Double-click the file to play."
                : "Select all the text below (Ctrl+A inside the box), copy it (Ctrl+C), and save it as a .json file. Or use this to import into the editor later."
              }
            </p>
            <textarea
              readOnly
              value={exportText}
              onFocus={e => e.target.select()}
              style={{ ...s.inp, flex: 1, minHeight: 300, fontFamily: "monospace", fontSize: 10, resize: "vertical", marginBottom: 12 }}
            />
            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              <button onClick={() => setShowExport(null)} style={s.btn}>Close</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Settings Modal ── */}
      {showSettings && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 500 }} onClick={() => setShowSettings(false)}>
          <div style={{ background: "#ffffff", border: "1px solid #d8d2c4", borderRadius: 3, padding: 24, width: 480 }} onClick={e => e.stopPropagation()}>
            <h3 style={{ fontSize: 20, fontWeight: 400, color: "#0f0e0d", marginBottom: 4, fontFamily: "'Bebas Neue', sans-serif", letterSpacing: 2 }}>GitHub Settings</h3>
            <p style={{ fontSize: 12, color: "#8c8272", marginBottom: 16, lineHeight: 1.6 }}>
              Connect to GitHub to upload images directly to your repo. Your token is stored in your browser and persists between visits. It never leaves your device except to talk to GitHub.
            </p>

            <label style={s.label}>Repository (owner/repo)</label>
            <input
              value={ghRepo}
              onChange={e => setGhRepo(e.target.value)}
              placeholder="paulbrbeal/Impact-Quest"
              style={s.inp}
            />

            <label style={s.label}>Personal Access Token</label>
            <input
              type="password"
              value={ghToken}
              onChange={e => setGhToken(e.target.value)}
              placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
              style={s.inp}
            />
            <div style={{ fontSize: 11, color: "#8c8272", marginTop: -8, marginBottom: 16, lineHeight: 1.6 }}>
              Create a token at <span style={{ color: "#c4782a" }}>github.com → Settings → Developer settings → Personal access tokens → Fine-grained tokens</span>. Give it <strong>Contents: Read and write</strong> permission on your Impact-Quest repo only.
            </div>

            {ghToken && (
              <div style={{ background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 3, padding: "8px 12px", marginBottom: 16, fontSize: 12, color: "#4a6741" }}>
                Token set. Images will upload to <strong>{ghRepo}</strong>/images/
              </div>
            )}

            <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
              {ghToken && <button onClick={() => { saveGhSettings("", ghRepo); flash("Token cleared"); }} style={{ ...s.btn, color: "#c0392b" }}>Clear Token</button>}
              <button onClick={() => { saveGhSettings(ghToken, ghRepo); setShowSettings(false); flash("Settings saved"); }} style={s.accent}>Save</button>
            </div>
          </div>
        </div>
      )}

      {/* ── Toast ── */}
      {toast && (
        <div style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", background: "#0f0e0d", border: "1px solid #e8963a", color: "#e8963a", padding: "7px 18px", borderRadius: 3, fontSize: 13, fontWeight: 600, zIndex: 1000, boxShadow: "0 4px 20px rgba(0,0,0,0.2)" }}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(React.createElement(Editor), document.getElementById("root"));

</script>
</body>
</html>
